name: Android Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, aab, both]

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      # ─── DEFINITIVE KOTLIN FIX ────────────────────────────────────────────
      # Flutter's composite build (flutter_tools/gradle) hardcodes Kotlin 1.9.x
      # inside the Flutter SDK itself. No project-level Gradle config, init
      # script, or resolutionStrategy can override this because the composite
      # build's compiler is resolved BEFORE any of those load.
      # The only fix is to patch Flutter's own Gradle source files directly
      # after the SDK is installed, before any build runs.
      - name: Patch Flutter SDK Gradle Kotlin version to 2.1.0
        run: |
          FLUTTER_ROOT=$(flutter sdk-path)
          echo "Flutter SDK root: $FLUTTER_ROOT"
          GRADLE_DIR="$FLUTTER_ROOT/packages/flutter_tools/gradle"
          echo "Patching Gradle files in: $GRADLE_DIR"
          find "$GRADLE_DIR" -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) | while read -r FILE; do
            if grep -q "1\.9\." "$FILE" 2>/dev/null; then
              echo "  Patching: $FILE"
              sed -i \
                -e 's/kotlin_version\s*=\s*"1\.9\.[^"]*"/kotlin_version = "2.1.0"/g' \
                -e "s/kotlin_version = '1\\.9\\.[^']*'/kotlin_version = '2.1.0'/g" \
                -e 's/\(kotlin[^"]*\)"1\.9\.[0-9]*"/\1"2.1.0"/g' \
                -e "s/\(kotlin[^']*\)'1\\.9\\.[0-9]*'/\1'2.1.0'/g" \
                "$FILE"
            fi
          done
          echo "Patch complete. Verifying:"
          grep -r "kotlin.*version\|kotlin_version" "$GRADLE_DIR" --include="*.gradle" --include="*.gradle.kts" | grep -v ".git" || true
      # ──────────────────────────────────────────────────────────────────────

      - name: Clean Flutter build cache
        working-directory: frontend
        run: flutter clean

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Decode keystore
        working-directory: frontend/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > riseup-release.jks

      - name: Create key.properties
        working-directory: frontend/android
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=riseup-release.jks
          EOF

      - name: Decode google-services.json
        working-directory: frontend/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json

      - name: Build APK (universal)
        if: ${{ github.event.inputs.build_type != 'aab' }}
        working-directory: frontend
        env:
          ADMOB_APP_ID:      ${{ secrets.ADMOB_APP_ID }}
          NATIVE_AD_UNIT:    ${{ secrets.NATIVE_AD_UNIT_ID }}
          API_BASE_URL:      ${{ secrets.API_BASE_URL }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=ADMOB_APP_ID=$ADMOB_APP_ID \
            --dart-define=NATIVE_AD_UNIT=$NATIVE_AD_UNIT

      - name: Build AAB (Play Store)
        if: ${{ github.event.inputs.build_type != 'apk' || startsWith(github.ref, 'refs/tags/') }}
        working-directory: frontend
        env:
          ADMOB_APP_ID:            ${{ secrets.ADMOB_APP_ID }}
          ADMOB_REWARDED_UNIT:     ${{ secrets.ADMOB_REWARDED_AD_UNIT }}
          ADMOB_BANNER_UNIT:       ${{ secrets.ADMOB_BANNER_AD_UNIT }}
          ADMOB_INTERSTITIAL_UNIT: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT }}
          ADMOB_APP_OPEN_UNIT:     ${{ secrets.ADMOB_APP_OPEN_AD_UNIT }}
          NATIVE_AD_UNIT:          ${{ secrets.NATIVE_AD_UNIT_ID }}
          API_BASE_URL:            ${{ secrets.API_BASE_URL }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:       ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=ADMOB_APP_ID=$ADMOB_APP_ID \
            --dart-define=ADMOB_REWARDED_UNIT=$ADMOB_REWARDED_UNIT \
            --dart-define=ADMOB_BANNER_UNIT=$ADMOB_BANNER_UNIT \
            --dart-define=ADMOB_INTERSTITIAL_UNIT=$ADMOB_INTERSTITIAL_UNIT \
            --dart-define=ADMOB_APP_OPEN_UNIT=$ADMOB_APP_OPEN_UNIT \
            --dart-define=NATIVE_AD_UNIT=$NATIVE_AD_UNIT

      - name: Upload APK artifact
        if: ${{ github.event.inputs.build_type != 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: riseup-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type != 'apk' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: riseup-release-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: RiseUp ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            frontend/build/app/outputs/flutter-apk/app-release.apk
            frontend/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
