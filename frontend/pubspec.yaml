name: riseup
description: RiseUp — AI-powered wealth building platform by ChAs Tech Group
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # Supabase
  supabase_flutter: ^2.5.2

  # HTTP
  dio: ^5.4.3+1
  http: ^1.2.1

  # Local Storage (cross-platform: Android, iOS, Web)
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # Chat UI
  dash_chat_2: ^0.0.21
  flutter_markdown: ^0.7.1

  # Payments
  url_launcher: ^6.3.0
  webview_flutter: ^4.8.0

  # Ads — Android & iOS only (conditionally imported, web uses stubs)
  google_mobile_ads: ^5.1.0

  # Notifications (Firebase — optional but cross-platform)
  flutter_local_notifications: ^17.2.1+2
  firebase_messaging: ^15.1.3
  firebase_core: ^3.4.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  image_picker: ^1.1.2
  share_plus: ^10.0.0

  # In-app review (native rating dialog)
  in_app_review: ^2.0.9

  # Crash reporting
  sentry_flutter: ^8.8.0

  # PDF generation (skill certificates)
  pdf: ^3.11.1
  printing: ^5.13.2

  # Icons
  iconsax: ^0.0.8
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.1

# ── App Icon (auto-generated in CI via flutter_launcher_icons) ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/riseup_logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0E17"
  adaptive_icon_foreground: "assets/images/riseup_logo.jpg"
  remove_alpha_ios: true
  web:
    generate: false   # handled manually via web/icons/

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/riseup_logo.jpg
    - assets/animations/
    - assets/icons/

  # Fonts: using Google Fonts package (no local font files needed)
