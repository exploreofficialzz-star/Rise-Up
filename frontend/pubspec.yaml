name: rise_up
description: RiseUp Flutter Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ──────────────────────────────────────
  go_router: ^14.0.0

  # ── Networking ──────────────────────────────────────
  dio: ^5.4.0
  http: ^1.2.0

  # ── Auth & Backend ──────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── Storage ─────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # ── UI & Icons ──────────────────────────────────────
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  flutter_markdown: ^0.7.3

  # ── Image Caching ────────────────────────────────────
  cached_network_image: ^3.4.1

  # ── Ads ─────────────────────────────────────────────
  google_mobile_ads: ^5.3.0

  # ── Notifications ───────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Connectivity ────────────────────────────────────
  connectivity_plus: ^6.1.0

  # ── Media & Files ───────────────────────────────────
  image_picker: ^1.1.2

  # ── Utilities ───────────────────────────────────────
  intl: ^0.20.2
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0

  # ── QR & Barcode ────────────────────────────────────
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # ── Video & Media ───────────────────────────────────
  video_player: ^2.9.1
  chewie: ^1.8.5
  photo_view: ^0.15.0
  image_cropper: ^8.0.2

  # ── Calendar & Date ─────────────────────────────────
  table_calendar: ^3.1.2
  syncfusion_flutter_calendar: ^28.1.38

  # ── Form & Input ────────────────────────────────────
  flutter_form_builder: 10.0.1     # Pinned — last version compatible with Dart 3.7.x
  form_builder_validators: ^11.0.0
  pinput: ^5.0.0

  # ── Security & Crypto ───────────────────────────────
  encrypt: ^5.0.3
  crypto: ^3.0.5
  local_auth: ^2.3.0
  flutter_screen_lock: ^9.1.0

  # ── Animation & Effects ─────────────────────────────
  rive: ^0.13.17
  particle_field: ^1.0.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.3.5
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  change_app_package_name: ^1.3.0
  msix: ^3.16.7
  mocktail: ^1.0.4
  faker: ^2.2.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/riseup_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0E17"
  adaptive_icon_foreground: "assets/images/riseup_logo.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#0F0E17"
  image: assets/images/riseup_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/riseup_logo.png
    color: "#0F0E17"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

msix_config:
  display_name: RiseUp
  publisher_display_name: ChAs Tech Group
  identity_name: ChAsTechGroup.RiseUp
  msix_version: 1.0.0.0
  logo_path: assets/images/riseup_logo.png
  capabilities: internetClient, location, microphone, webcam
