name: rise_up
description: RiseUp Flutter Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── QR & Barcode ────────────────────────────────────
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # ── Video & Media ───────────────────────────────────
  video_player: ^2.9.1
  chewie: ^1.8.1
  photo_view: ^0.15.0
  image_cropper: ^8.0.2

  # ── Calendar & Date ─────────────────────────────────
  table_calendar: ^3.1.2
  syncfusion_flutter_calendar: ^26.2.14

  # ── Form & Input ────────────────────────────────────
  flutter_form_builder: ^9.3.0
  form_builder_validators: ^11.0.0
  pinput: ^5.0.0

  # ── Security & Crypto ───────────────────────────────
  encrypt: ^5.0.3
  crypto: ^3.0.5
  local_auth: ^2.3.0
  flutter_screen_lock: ^9.1.0

  # ── Animation & Effects ─────────────────────────────
  rive: ^0.13.9
  particle_field: ^1.0.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.3.5
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  change_app_package_name: ^1.3.0
  msix: ^3.16.7
  mocktail: ^1.0.4
  faker: ^2.2.0

# ── App Icons ───────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/riseup_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0E17"
  adaptive_icon_foreground: "assets/images/riseup_logo.png"
  remove_alpha_ios: true
  web:
    generate: false

# ── Native Splash Screen ─────────────────────────────
flutter_native_splash:
  color: "#0F0E17"
  image: assets/images/riseup_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/riseup_logo.png
    color: "#0F0E17"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
    # ── Sound directories below are commented out until the folders
    #    and files actually exist in the repo. Uncomment when ready:
    # - assets/sounds/
    # - assets/sounds/ui/
    # - assets/sounds/effects/
    # - assets/sounds/notifications/

# ── MSIX (Windows) Configuration ─────────────────────
msix_config:
  display_name: RiseUp
  publisher_display_name: ChAs Tech Group
  identity_name: ChAsTechGroup.RiseUp
  msix_version: 1.0.0.0
  logo_path: assets/images/riseup_logo.png
  capabilities: internetClient, location, microphone, webcam
