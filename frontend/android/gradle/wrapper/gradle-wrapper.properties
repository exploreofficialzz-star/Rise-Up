distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
# AGP 8.3.x minimum is Gradle 8.4. Using 8.6 gives us a well-tested
# middle ground — above minimum, within Flutter 3.27.3's compatibility range,
# and no risk of AGP 8.3.0 / Gradle 8.7+ deprecation collisions.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-all.zip
