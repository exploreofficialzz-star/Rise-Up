pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Enforce Kotlin 2.1.0 at plugin-resolution time so the Flutter SDK
    // composite build cannot silently downgrade the compiler version.
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id.startsWith("org.jetbrains.kotlin")) {
                useVersion("2.1.0")
            }
        }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // FIXED: was 8.1.4 — this is the version settings.gradle actually uses
    // (overrides build.gradle classpath in Flutter's plugin management system).
    // AGP 8.1.4 was built against Kotlin 1.8.x and caused the metadata mismatch.
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    id "com.google.gms.google-services" version "4.4.1" apply false
}

include ":app"
