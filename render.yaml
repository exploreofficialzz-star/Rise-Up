services:
  - type: web
    name: riseup-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    rootDir: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: RiseUp
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_ENCRYPTION_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_HASH
        sync: false
      - key: ADMOB_APP_ID
        sync: false
      - key: ADMOB_REWARDED_AD_UNIT
        sync: false
      - key: ADMOB_BANNER_AD_UNIT
        sync: false
      - key: ADMOB_INTERSTITIAL_AD_UNIT
        sync: false
      - key: ADMOB_APP_OPEN_AD_UNIT
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://yourdomain.com
      - key: AI_PREFERENCE
        value: auto
    healthCheckPath: /health
    autoDeploy: true
